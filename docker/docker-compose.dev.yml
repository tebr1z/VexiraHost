services:
  postgres:
    image: postgres:16-alpine
    container_name: vexira-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: vexira
      POSTGRES_PASSWORD: vexira
      POSTGRES_DB: vexira_host
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vexira-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

volumes:
  postgres_dev_data:
  redis_dev_data:
